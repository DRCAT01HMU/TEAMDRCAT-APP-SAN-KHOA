@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/vanta@latest/dist/vanta.halo.min.js"></script>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

function parseQuizData(text) {
    const lines = text.split('\n').map(l => l.trim()).filter(l => l);
    const questions = [];
    let currentQ = null;
    let currentMode = 'context';
    let currentContext = "";
    let isBuildingContext = false;

    lines.forEach(line => {
        line = line.replace(/^[\u2022\u00b7\-\*]\s*/, '').trim();
        if (!line) return;

        const isSection = line.match(/^(?:PHẦN|Phần)\s+[I|V|X|\d]+/i);
        if (isSection) {
            currentContext = "";
            isBuildingContext = false;
        }

        const isCaseStart = line.match(/^(?:TÌNH HUỐNG LÂM SÀNG|Case lâm sàng|Tình huống|Case\s*\d+)/i);
        const isQ = line.match(/^(?:Câu|Question)[^\d]*([\d\.]+)(?:[^a-z0-9]*[:\.\-])?\s*(.*)/i);
        const isOpt = line.match(/^\(?([A-E])\)?[.\)\:\-\/]?\s+(.*)/i) || line.match(/^([A-E])[.\)\:\-\/]\s*(.*)/i);
        const isAns = line.match(/^(?:Đáp án(?: đúng)?|Answer)\s*[:\.\-]?\s*\(?([A-E])\)?/i);

        if (isCaseStart && !isQ) {
            currentContext = line + '\n';
            isBuildingContext = true;
            currentMode = 'context';
            return;
        }

        if (isQ && !isAns) {
            isBuildingContext = false;
            if (currentQ) questions.push(currentQ);
            
            currentQ = { 
                id: questions.length + 1, 
                originalId: isQ[1], 
                context: currentContext.trim(), 
                question: isQ[2] || '', 
                options: {}, 
                answer: '' 
            };
            currentMode = 'question';
            return;
        }

        // Lọc bỏ 100% phần giải thích
        if (isAns && currentQ) {
            currentQ.answer = isAns[1].toUpperCase();
            currentMode = 'skip';
            return;
        }
        
        if (line.match(/^(Giải thích|Tại sao các lựa chọn khác|Tài liệu được biên soạn|Nghiêm cấm sao chép|Đúng:|Sai:)/i)) {
            currentMode = 'skip';
            return;
        }

        if (currentMode === 'skip') return;

        if (isBuildingContext) {
            if (!line.match(/^(TRẮC NGHIỆM|BASEDOW|BỆNH LÝ BASEDOW|HỘI CHỨNG|ĐỘT QUỴ|ĐỘNG KINH|COPD|ĐÁI MÁU|NỘI KHOA|TEAMDRCAT|==========|Tài liệu được|Nghiêm cấm|\[🛑)/i)) {
                currentContext += line + '\n';
            }
            return;
        }

        if (currentQ) {
            if (isOpt) {
                currentQ.options[isOpt[1].toUpperCase()] = isOpt[2].trim();
                currentMode = 'options';
            } else if (currentMode === 'question') {
                currentQ.question += '\n' + line;
            } else if (currentMode === 'options') {
                const keys = Object.keys(currentQ.options);
                if (keys.length > 0) {
                    const lastKey = keys[keys.length - 1];
                    currentQ.options[lastKey] += '\n' + line;
                }
            } 
        }
    });
    if (currentQ) questions.push(currentQ);
    return questions;
}

const playCorrectSound = () => {
    try {
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        if (!AudioContext) return;
        const ctx = new AudioContext();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.type = 'sine';
        osc.frequency.setValueAtTime(600, ctx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(1200, ctx.currentTime + 0.1);
        gain.gain.setValueAtTime(0.1, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.15);
        osc.start(ctx.currentTime);
        osc.stop(ctx.currentTime + 0.15);
    } catch (e) { console.error(e); }
};

const playIncorrectSound = () => {
    try {
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        if (!AudioContext) return;
        const ctx = new AudioContext();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.type = 'triangle';
        osc.frequency.setValueAtTime(300, ctx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(150, ctx.currentTime + 0.2);
        gain.gain.setValueAtTime(0.1, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.2);
        osc.start(ctx.currentTime);
        osc.stop(ctx.currentTime + 0.2);
    } catch (e) { console.error(e); }
};


const RealTimeClock = () => {
    const [time, setTime] = React.useState(new Date());
    React.useEffect(() => {
        const timer = setInterval(() => setTime(new Date()), 1000);
        return () => clearInterval(timer);
    }, []);
    const formatTime = (date) => {
        const d = date.getDay();
        const days = ['Chủ Nhật', 'Thứ Hai', 'Thứ Ba', 'Thứ Tư', 'Thứ Năm', 'Thứ Sáu', 'Thứ Bảy'];
        const dayStr = days[d];
        const dateStr = date.toLocaleDateString('vi-VN', {day:'2-digit', month:'2-digit', year:'numeric'});
        const timeStr = date.toLocaleTimeString('vi-VN', {hour:'2-digit', minute:'2-digit', second:'2-digit'});
        return `${timeStr} - ${dayStr}, ${dateStr}`;
    };
    return (
        <div className="hidden lg:flex items-center gap-2 px-3 py-1.5 rounded-lg border border-slate-200 dark:border-slate-700 bg-white/50 dark:bg-slate-800/50 text-slate-600 dark:text-slate-300 font-mono text-xs font-bold shadow-sm">
            <i className="fa-regular fa-clock text-rose-500"></i>
            {formatTime(time)}
        </div>
    );
};


const GoogleSearch = () => {
    const [query, setQuery] = React.useState('');
    const [isOpen, setIsOpen] = React.useState(false);
    const inputRef = React.useRef(null);

    React.useEffect(() => {
        if (isOpen && inputRef.current) {
            inputRef.current.focus();
        }
    }, [isOpen]);

    const handleSearch = (e) => {
        e.preventDefault();
        if(query.trim()) {
            window.open(`https://www.google.com/search?q=${encodeURIComponent(query)}`, '_blank');
            setQuery('');
            setIsOpen(false);
        }
    };

    return (
        <div className="relative z-50">
            <button onClick={() => setIsOpen(!isOpen)} className={`p-2.5 rounded-xl transition-all duration-300 border shadow-sm ${isOpen ? 'bg-blue-100 dark:bg-blue-900/50 border-blue-300 dark:border-blue-700 text-rose-600 dark:text-blue-400' : 'bg-white/60 dark:bg-slate-700/60 hover:bg-white dark:hover:bg-slate-600 border-white/40 dark:border-slate-600/50 text-slate-600 dark:text-slate-300'}`} title="Tra cứu Google">
                <i className="fa-brands fa-google text-lg"></i>
            </button>
            {isOpen && (
                <div className="fixed left-4 right-4 top-24 sm:absolute sm:left-auto sm:right-0 sm:top-full mt-3 p-3 glass-panel rounded-2xl shadow-2xl border border-white/60 dark:border-slate-700/60 sm:w-[350px] z-[999] animate-in fade-in slide-in-from-top-2 duration-300">
                    <form onSubmit={handleSearch} className="flex items-center gap-2">
                        <div className="relative flex-1">
                            <i className="fa-solid fa-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 text-slate-400"></i>
                            <input 
                                ref={inputRef}
                                type="text" 
                                value={query}
                                onChange={(e) => setQuery(e.target.value)}
                                placeholder="Tra cứu Google y khoa..." 
                                className="w-full pl-9 pr-3 py-2.5 rounded-xl border border-slate-200 dark:border-slate-600 bg-white/90 dark:bg-slate-800/90 focus:ring-2 focus:ring-rose-400 focus:border-blue-500 outline-none text-sm text-slate-700 dark:text-slate-200 font-medium transition-all shadow-inner"
                            />
                        </div>
                        <button type="submit" className="p-2.5 btn-gradient text-white rounded-xl shadow-md hover:-translate-y-0.5 transition-transform"><i className="fa-solid fa-arrow-right"></i></button>
                    </form>
                    <div className="mt-2 text-[10px] text-center text-slate-400 dark:text-slate-500 font-semibold uppercase tracking-widest">Mở trong Tab mới</div>
                </div>
            )}
        </div>
    );
};

function App() {
    const [appState, setAppState] = useState(() => localStorage.getItem('teamdrcat_unlocked_' + document.title) === 'true' ? 'intro' : 'locked');
    const [passwordInput, setPasswordInput] = useState('');
      const [showPassword, setShowPassword] = useState(false);
    const [pwError, setPwError] = useState(false);
    const [unlockCountdown, setUnlockCountdown] = useState(3);
    const [questions, setQuestions] = useState([]);
    const [currentIndex, setCurrentIndex] = useState(0);
    const [answers, setAnswers] = useState({});
    const [flagged, setFlagged] = useState(new Set());
    const [timeRemaining, setTimeRemaining] = useState(0); 
    const [showMatrix, setShowMatrix] = useState(false);
    const [isPaused, setIsPaused] = useState(false);
        const [isDarkMode, setIsDarkMode] = useState(false);
    const [showDrNote, setShowDrNote] = useState(false);
    const [drNoteContent, setDrNoteContent] = useState("");
    const [notePos, setNotePos] = useState({x: window.innerWidth - 320, y: 100});
    const [isSoundEnabled, setIsSoundEnabled] = useState(true);
      const [zoomLevel, setZoomLevel] = useState(100);
    
    const scrollContainerRef = useRef(null);
    const [vantaEffect, setVantaEffect] = useState(null);
    
    useEffect(() => {
        const rootEl = document.getElementById('root');
        const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) || (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
          if (!vantaEffect && window.VANTA && rootEl && !isIOS) {
            const isMobile = window.innerWidth < 768;
            setVantaEffect(window.VANTA.HALO({
                el: document.body,
                mouseControls: true,
                touchControls: true,
                gyroControls: false,
                minHeight: 200.00,
                minWidth: 200.00,
                scale: 1.00,
                scaleMobile: isMobile ? 0.35 : 1.00,
                color: isDarkMode ? 0x0ea5e9 : 0x38bdf8,
                backgroundColor: isDarkMode ? 0x082f49 : 0xf0f9ff,
                points: isMobile ? 8.00 : 15.00,
                maxDistance: isMobile ? 25.00 : 20.00,
                spacing: isMobile ? 22.00 : 16.00
            }));
        }
        return () => {
            if (vantaEffect) vantaEffect.destroy();
        }
    }, [vantaEffect]);
    
    useEffect(() => {
        if (vantaEffect) {
            vantaEffect.setOptions({
                color: isDarkMode ? 0x0ea5e9 : 0x38bdf8,
                backgroundColor: isDarkMode ? 0x082f49 : 0xf0f9ff,
            });
        }
    }, [isDarkMode, vantaEffect]);


    const playHeartbeatSound = () => {
        try {
            const AudioContext = window.AudioContext || window.webkitAudioContext;
            if (!AudioContext) return;
            const ctx = new AudioContext();
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.connect(gain);
            gain.connect(ctx.destination);
            osc.type = 'sine';
            osc.frequency.setValueAtTime(60, ctx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(30, ctx.currentTime + 0.1);
            gain.gain.setValueAtTime(0.5, ctx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.2);
            osc.start(ctx.currentTime);
            osc.stop(ctx.currentTime + 0.2);
        } catch (e) { }
    };

    useEffect(() => {
        function b64DecodeUnicode(str) {
            return decodeURIComponent(atob(str).split('').map(function(c) {
                return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
            }).join(''));
        }
        const rawB64 = document.getElementById('quizData').textContent.trim() || '';
        let rawData = '';
        try { rawData = b64DecodeUnicode(rawB64); } catch(e) { rawData = rawB64; }
        const parsedQs = parseQuizData(rawData);
        setQuestions(parsedQs);
        
        const unlockKey = 'teamdrcat_unlocked_' + document.title;
        if (localStorage.getItem(unlockKey) === 'true') {
            setAppState('intro');
        }
        
        const storageKey = 'teamdrcat_' + document.title;
        const saved = localStorage.getItem(storageKey);
        if(saved) {
            try {
                const data = JSON.parse(saved);
                setAnswers(data.answers || {});
                setFlagged(new Set(data.flagged || []));
                if (data.timeRemaining) setTimeRemaining(data.timeRemaining);
                else setTimeRemaining(parsedQs.length * 60);
                if (data.currentIndex) setCurrentIndex(data.currentIndex);
                if (data.drNoteContent) setDrNoteContent(data.drNoteContent);
            } catch(e) {
                setTimeRemaining(parsedQs.length * 60);
            }
        } else {
            setTimeRemaining(parsedQs.length * 60);
        }
    }, []);

    useEffect(() => {
        const preventDefault = (e) => e.preventDefault();
        const preventKeyboard = (e) => {
            if (e.keyCode === 123) e.preventDefault();
            if (e.ctrlKey && e.shiftKey && e.keyCode === 73) e.preventDefault();
            if (e.ctrlKey && e.shiftKey && e.keyCode === 74) e.preventDefault();
            if (e.ctrlKey && e.keyCode === 85) e.preventDefault();
            if (e.ctrlKey && e.keyCode === 83) e.preventDefault();
        };
        document.addEventListener('contextmenu', preventDefault);
        document.addEventListener('keydown', preventKeyboard);
        document.addEventListener('dragstart', preventDefault);
        return () => {
            document.removeEventListener('contextmenu', preventDefault);
            document.removeEventListener('keydown', preventKeyboard);
            document.removeEventListener('dragstart', preventDefault);
        }
    }, []);

    useEffect(() => {
        if(questions.length > 0 && appState === 'quiz') {
            const storageKey = 'teamdrcat_' + document.title;
            localStorage.setItem(storageKey, JSON.stringify({
                answers: answers,
                flagged: Array.from(flagged),
                timeRemaining: timeRemaining,
                currentIndex: currentIndex,
                drNoteContent: drNoteContent
            }));
        }
    }, [answers, flagged, timeRemaining, questions.length, appState, currentIndex, drNoteContent]);

    useEffect(() => {
        if (appState === 'result' && scrollContainerRef.current) {
            scrollContainerRef.current.scrollTo({ top: 0, behavior: 'smooth' });
        }
    }, [appState]);

    useEffect(() => {
        let timer;
        if (appState === 'quiz' && !isPaused && timeRemaining > 0) {
            timer = setInterval(() => {
                setTimeRemaining(p => {
                    if (p <= 10 && p > 0 && isSoundEnabled) playHeartbeatSound();
                    return p - 1;
                });
            }, 1000);
        } else if (timeRemaining <= 0 && appState === 'quiz') {
            setAppState('result');
        }
        
        return () => clearInterval(timer);
    }, [appState, timeRemaining, isPaused, isSoundEnabled]);

    useEffect(() => {
        if (appState === 'unlocking') {
            if (unlockCountdown > 0) {
                const timer = setTimeout(() => {
                    setUnlockCountdown(c => c - 1);
                    if (isSoundEnabled) playCorrectSound();
                }, 1000);
                return () => clearTimeout(timer);
            } else {
                setAppState('intro');
            }
        }
    }, [appState, unlockCountdown, isSoundEnabled]);

    useEffect(() => {
        const handleKeyDown = (e) => {
            if(appState !== 'quiz' || isPaused) return;
            if(e.target.tagName === 'BUTTON' || e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
            
            const q = questions[currentIndex];
            if(!q) return;
            const optKeys = Object.keys(q.options);
            const keyMap = {'1':0, '2':1, '3':2, '4':3, 'a':0, 'b':1, 'c':2, 'd':3};
            const mappedIdx = keyMap[e.key.toLowerCase()];
            
            if(mappedIdx !== undefined && mappedIdx < optKeys.length) {
                const selectedKey = optKeys[mappedIdx];
                if (!answers[currentIndex]) {
                    setAnswers(prev => ({ ...prev, [currentIndex]: selectedKey }));
                    if (isSoundEnabled) {
                        q.answer === selectedKey ? playCorrectSound() : playIncorrectSound();
                    }
                }
            }
            if(e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                setCurrentIndex(p => Math.min(questions.length - 1, p + 1));
            }
            if(e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                setCurrentIndex(p => Math.max(0, p - 1));
            }
            if(e.key === ' ' || e.code === 'Space') {
                e.preventDefault();
                setFlagged(prev => {
                    const newFlagged = new Set(prev);
                    if (newFlagged.has(currentIndex)) newFlagged.delete(currentIndex);
                    else newFlagged.add(currentIndex);
                    return newFlagged;
                });
            }
        };
        window.addEventListener('keydown', handleKeyDown);
        return () => window.removeEventListener('keydown', handleKeyDown);
    }, [appState, isPaused, currentIndex, questions, answers, isSoundEnabled]);

    useEffect(() => {
        if (isDarkMode) document.documentElement.classList.add('dark');
        else document.documentElement.classList.remove('dark');
    }, [isDarkMode]);

      useEffect(() => {
          document.documentElement.style.fontSize = `${zoomLevel}%`;
      }, [zoomLevel]);

    const formatTime = (seconds) => {
        const h = Math.floor(seconds / 3600);
        const m = Math.floor((seconds % 3600) / 60);
        const s = seconds % 60;
        if (h > 0) return `${h}:${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
        return `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
    };

    const startQuiz = () => {
        if (questions.length === 0) {
            alert("Lỗi tải dữ liệu câu hỏi. Vui lòng kiểm tra lại file data.");
            return;
        }
        setAppState('quiz');
        // Restart logic
        if(Object.keys(answers).length === questions.length) {
            setAnswers({}); setFlagged(new Set()); setTimeRemaining(questions.length * 60); setCurrentIndex(0);
        }
        setIsPaused(false);
    };

    const restartQuiz = () => {
        setAppState('intro');
        setAnswers({});
        setFlagged(new Set());
        setTimeRemaining(questions.length * 60);
        setCurrentIndex(0);
        setShowMatrix(false);
        const storageKey = 'teamdrcat_' + document.title;
        localStorage.removeItem(storageKey);
        if (scrollContainerRef.current) scrollContainerRef.current.scrollTo({ top: 0 });
    };

    const togglePause = () => {
        if (appState === 'quiz') setIsPaused(!isPaused);
    };

    const handleSelectAnswer = (key) => {
        if (answers[currentIndex] || appState !== 'quiz' || isPaused) return;
        
        const isCorrect = questions[currentIndex].answer === key;
        if (isSoundEnabled) {
            if (isCorrect) {
                playCorrectSound();
            } else {
                playIncorrectSound();
            }
        }
        
        setAnswers(prev => ({ ...prev, [currentIndex]: key }));
    };

    const toggleFlag = () => {
        const newFlagged = new Set(flagged);
        if (newFlagged.has(currentIndex)) newFlagged.delete(currentIndex);
        else newFlagged.add(currentIndex);
        setFlagged(newFlagged);
    };

    const calculateScore = () => questions.reduce((acc, q, i) => (answers[i] === q.answer ? acc + 1 : acc), 0);

    const getEncouragement = () => {
        if (questions.length === 0) return null;
        const score = calculateScore();
        const percent = score / questions.length;
        if (percent >= 0.9) return { title: "BÁC SĨ CHUYÊN KHOA CẤP CAO", text: "Vinh danh bạn! Chẩn đoán vô cùng chính xác và hoàn hảo.", icon: "fa-award", color: "text-red-700 dark:text-red-300 bg-red-100 dark:bg-red-900/40 border-red-400" };
        if (percent >= 0.7) return { title: "BÁC SĨ NỘI TRÚ XUẤT SẮC", text: "Tuyệt vời. Tư duy lâm sàng của bạn rất vững.", icon: "fa-stethoscope", color: "text-rose-600 dark:text-rose-300 bg-rose-50 dark:bg-rose-900/40 border-rose-400" };
        if (percent >= 0.5) return { title: "THỰC TẬP SINH TRIỂN VỌNG", text: "Có nền tảng. Cần nạp thêm kiến thức để xử lý ca phức tạp nhé!", icon: "fa-user-nurse", color: "text-emerald-600 dark:text-emerald-400 bg-emerald-50 dark:bg-emerald-900/40 border-emerald-400" };
        return { title: "CẤP CỨU VIÊN TẬP SỰ", text: "Mức độ khẩn cấp! Kỹ năng trực giác chưa đủ, bạn cần học bài ngay!", icon: "fa-truck-medical", color: "text-rose-600 dark:text-rose-400 bg-rose-50 dark:bg-rose-900/40 border-rose-400" };
    };

    
    const renderQuizContent = () => {
        if (isPaused) {
            return (
                <div className="glass-panel rounded-3xl p-16 text-center shadow-2xl animate-in fade-in zoom-in duration-300 mt-10 relative z-10">
                    <div className="w-24 h-24 bg-red-100 dark:bg-red-900/50 text-red-600 dark:text-red-400 rounded-full flex items-center justify-center mx-auto mb-8 shadow-inner">
                        <i className="fa-solid fa-pause text-5xl"></i>
                    </div>
                    <h2 className="text-3xl font-black text-slate-800 dark:text-slate-100 mb-4">Bài thi đang tạm dừng</h2>
                    <button onClick={togglePause} className="btn-gradient text-white px-12 py-4 rounded-2xl font-bold text-xl shadow-lg shadow-red-300/50 dark:shadow-none hover:shadow-red-400/50 transition-all">Tiếp tục ngay</button>
                </div>
            );
        }

        if (appState === 'result') {
            const msg = getEncouragement();
            const percent = questions.length > 0 ? calculateScore() / questions.length : 0;
            return (
                <div className="space-y-8 animate-in slide-in-from-bottom-8 duration-500 mt-4 relative z-10">
                    <div className="glass-panel p-8 md:p-12 rounded-[2.5rem] shadow-2xl relative overflow-visible transform-gpu">
                        
                        <div className="relative bg-[#0b1221] dark:bg-black p-8 rounded-[2rem] mb-12 shadow-2xl overflow-visible border border-slate-700/50">
                            <div className="absolute top-0 right-0 w-64 h-64 bg-red-500/10 rounded-full blur-3xl"></div>
                            <div className="absolute bottom-0 left-0 w-48 h-48 bg-rose-500/10 rounded-full blur-3xl"></div>
                            
                            <div className="flex flex-col md:flex-row items-center justify-between relative z-10">
                                <div className="flex items-center gap-6 text-left w-full md:w-auto">
                                    <div className="w-20 h-20 bg-gradient-to-br from-red-500 to-rose-600 rounded-2xl flex items-center justify-center text-white shadow-[0_0_30px_rgba(59,130,246,0.3)] shrink-0">
                                        <i className="fa-solid fa-heart-pulse text-4xl"></i>
                                    </div>
                                    <div>
                                        <h2 className="text-rxl md:text-3xl font-black text-white tracking-tight uppercase mb-1">Báo Cáo Hội Chẩn</h2>
                                        <div className="flex items-center gap-3 flex-wrap">
                                            <span className="text-red-400 font-bold uppercase tracking-widest text-xs">TeamDrCat E-Health</span>
                                        </div>
                                    </div>
                                </div>
                                <div className="mt-6 md:mt-0 w-full md:w-auto flex justify-end">
                                    {percent < 0.5 ? (
                                        <div className="px-5 py-2.5 rounded-xl bg-red-500/10 border border-red-500/30 text-red-500 font-black text-sm uppercase tracking-widest flex items-center gap-3 shadow-[0_0_15px_rgba(239,68,68,0.2)]">
                                            <div className="relative flex items-center justify-center w-3 h-3"><span className="absolute w-3 h-3 rounded-full bg-red-500 animate-ping"></span><span className="relative w-2 h-2 rounded-full bg-red-500"></span></div>
                                            KHẨN CẤP
                                        </div>
                                    ) : (percent < 0.8 ? (
                                        <div className="px-5 py-2.5 rounded-xl bg-amber-500/10 border border-amber-500/30 text-amber-500 font-black text-sm uppercase tracking-widest flex items-center gap-3 shadow-[0_0_15px_rgba(245,158,11,0.2)]">
                                            <span className="w-2.5 h-2.5 rounded-full bg-amber-500"></span>
                                            TRUNG BÌNH
                                        </div>
                                    ) : (
                                        <div className="px-5 py-2.5 rounded-xl bg-emerald-500/10 border border-rose-500/30 text-rose-500 font-black text-sm uppercase tracking-widest flex items-center gap-3 shadow-[0_0_15px_rgba(16,185,129,0.2)]">
                                            <span className="w-2.5 h-2.5 rounded-full bg-emerald-500"></span>
                                            THÔNG THƯỜNG
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>

                        <div className="flex flex-col md:flex-row items-center justify-center gap-12 mb-12 w-full">
                            <div className="relative shrink-0">
                                <svg className="w-56 h-56 transform -rotate-90">
                                    <circle cx="112" cy="112" r="90" stroke="currentColor" strokeWidth="16" fill="transparent" className="text-slate-100 dark:text-slate-800" />
                                    <circle cx="112" cy="112" r="90" stroke="currentColor" strokeWidth="16" fill="transparent"
                                        strokeDasharray="565.48"
                                        strokeDashoffset={565.48 - (percent * 565.48)}
                                        strokeLinecap="round"
                                        className="text-red-500 drop-shadow-[0_0_15px_rgba(59,130,246,0.6)] transition-all duration-[2000ms] ease-out" />
                                </svg>
                                <div className="absolute inset-0 flex flex-col items-center justify-center">
                                    <span className="text-6xl font-black bg-clip-text text-transparent bg-gradient-to-br from-red-600 to-rose-500 dark:from-red-400 dark:to-rose-300 drop-shadow-sm">{calculateScore()}</span>
                                    <span className="text-sm font-bold text-slate-400 uppercase tracking-widest mt-1">/ {questions.length} ĐIỂM</span>
                                </div>
                            </div>
                            
                            {msg && (
                                <div className={`p-8 rounded-[2rem] border min-w-[300px] max-w-md w-full flex flex-col gap-3 ${msg.color} backdrop-blur-md shadow-xl relative overflow-hidden group`}>
                                    <div className="absolute -right-10 -bottom-10 opacity-[0.07] group-hover:scale-110 group-hover:rotate-12 transition-all duration-700">
                                        <i className={`fa-solid ${msg.icon} text-9xl`}></i>
                                    </div>
                                    <div className="flex items-center gap-4 relative z-10">
                                        <div className="bg-white/50 w-14 h-14 rounded-full flex items-center justify-center shadow-sm shrink-0">
                                            <i className={`fa-solid ${msg.icon} text-2xl`}></i>
                                        </div>
                                        <h3 className="text-xl font-black uppercase tracking-wide leading-tight">{msg.title}</h3>
                                    </div>
                                    <p className="text-base font-semibold opacity-90 relative z-10 leading-relaxed mt-2">{msg.text}</p>
                                </div>
                            )}
                        </div>
                        
                        <div className="grid grid-cols-2 lg:grid-cols-4 gap-4 md:gap-6 mb-8 text-left">
                            <div className="relative glass-panel overflow-visible transform-gpu group hover:scale-[1.02] transition-all duration-300 rounded-[2rem] border-t-4 border-t-emerald-400 p-6 shadow-xl">
                                <div className="absolute -right-4 -top-4 w-24 h-24 bg-emerald-400/20 rounded-full blur-2xl group-hover:bg-emerald-400/40 transition-all"></div>
                                <div className="flex items-center justify-between mb-4">
                                    <h3 className="text-sm font-black uppercase text-emerald-600 dark:text-emerald-400 tracking-wider">Đúng</h3>
                                    <div className="w-10 h-10 rounded-xl bg-emerald-100 dark:bg-emerald-900/50 flex items-center justify-center text-emerald-600 dark:text-emerald-400 shadow-sm shrink-0">
                                        <i className="fa-solid fa-check text-xl"></i>
                                    </div>
                                </div>
                                <p className="text-4xl font-black text-slate-800 dark:text-slate-100 mb-1">{calculateScore()}</p>
                                <p className="text-[10px] font-bold text-slate-400 uppercase tracking-widest hidden md:block">Câu trả lời</p>
                            </div>
                            
                            <div className="relative glass-panel overflow-visible transform-gpu group hover:scale-[1.02] transition-all duration-300 rounded-[2rem] border-t-4 border-t-rose-400 p-6 shadow-xl">
                                <div className="absolute -right-4 -top-4 w-24 h-24 bg-rose-400/20 rounded-full blur-2xl group-hover:bg-rose-400/40 transition-all"></div>

                                        <div className="relative w-full mb-6">
                        <input 
                            type={showPassword ? "text" : "password"}
                            value={passwordInput}
                            onChange={(e) => { setPasswordInput(e.target.value); setPwError(false); }}
                            onKeyDown={(e) => { if(e.key === 'Enter') handleUnlock(); }}
                            className={`w-full px-5 py-4 rounded-xl font-bold bg-white/70 dark:bg-slate-800/70 border-2 outline-none transition-all shadow-sm text-center tracking-[0.3em] text-lg ${pwError ? 'border-red-400 text-red-500 bg-red-50' : 'border-slate-200 dark:border-slate-700 focus:border-red-500 text-slate-800 dark:text-slate-100'}`}
                            placeholder="••••••••••"
                        />
                        <button onClick={() => setShowPassword(!showPassword)} className="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 hover:text-red-500 transition-colors">
                            <i className={`fa-solid ${showPassword ? 'fa-eye-slash' : 'fa-eye'} text-lg`}></i>
                        </button>
                    </div>
                    
                    {pwError && <p className="text-red-500 text-xs font-bold uppercase mb-4 tracking-widest flex items-center justify-center gap-2 animate-in slide-in-from-top-1"><i className="fa-solid fa-triangle-exclamation"></i> Mật khẩu chưa đúng</p>}
                    
                    <button onClick={handleUnlock} className="w-full btn-gradient text-white text-lg font-black py-4 rounded-2xl flex items-center justify-center gap-3 shadow-lg hover:-translate-y-1 transition-all border border-white/20">
                        <i className="fa-solid fa-key"></i> Xác nhận
                    </button>
                    <p className="mt-8 text-[10px] font-black text-slate-400 uppercase tracking-widest opacity-80">Tài liệu nội bộ TEAMDRCAT</p>
                </div>
            </div>
        );
    }

    if (appState === 'unlocking') {
        return (
            <div className="min-h-screen flex flex-col items-center justify-center p-4 relative overflow-visible bg-transparent z-40 text-center">
                <div key={unlockCountdown} className="animate-heartbeat flex flex-col items-center justify-center" style={{ animationDuration: '1s' }}>
                    <div className="text-[180px] md:text-[220px] font-black leading-none bg-clip-text text-transparent bg-gradient-to-b from-red-400 to-rose-500 drop-shadow-[0_0_40px_rgba(220,38,38,0.8)] filter">
                        {unlockCountdown}
                    </div>
                </div>
            </div>
        );
    }

    if (appState === 'intro') {
        return (
            <div className="min-h-screen flex flex-col items-center justify-center p-4 relative overflow-visible bg-transparent">
                
                <div className="absolute top-4 right-4 z-50 flex gap-3">
                    <button onClick={() => setIsSoundEnabled(!isSoundEnabled)} className="p-3 glass-panel shadow-lg rounded-full hover:bg-white/90 dark:hover:bg-slate-700/90 transition-all duration-300 text-slate-600 dark:text-slate-300 hover:scale-110">
                        {isSoundEnabled ? <i className="fa-solid fa-volume-high text-xl text-red-500"></i> : <i className="fa-solid fa-volume-xmark text-xl text-slate-400"></i>}
                    </button>
                    <button onClick={() => setZoomLevel(prev => Math.min(prev + 10, 150))} title="Phóng to" className="p-3 glass-panel shadow-lg rounded-full hover:bg-white/90 dark:hover:bg-slate-700/90 transition-all duration-300 text-slate-600 dark:text-slate-300 hover:scale-110">
                          <i className="fa-solid fa-magnifying-glass-plus text-xl text-rose-500"></i>
                      </button>
                      <button onClick={() => setZoomLevel(prev => Math.max(prev - 10, 50))} title="Thu nhỏ" className="p-3 glass-panel shadow-lg rounded-full hover:bg-white/90 dark:hover:bg-slate-700/90 transition-all duration-300 text-slate-600 dark:text-slate-300 hover:scale-110">
                          <i className="fa-solid fa-magnifying-glass-minus text-xl text-rose-500"></i>
                      </button>
                      <button onClick={() => setIsDarkMode(!isDarkMode)} className="p-3 glass-panel shadow-lg rounded-full hover:bg-white/90 dark:hover:bg-slate-700/90 transition-all duration-300 text-slate-600 dark:text-slate-300 hover:scale-110">
                        {isDarkMode ? <i className="fa-solid fa-sun text-xl text-amber-500"></i> : <i className="fa-solid fa-moon text-xl text-red-500"></i>}
                    </button>
                </div>
                <div className="max-w-2xl w-full glass-panel rounded-[2.5rem] shadow-2xl overflow-visible transform-gpu relative z-10 border-t border-l border-white/80 dark:border-slate-700/50 animate-in fade-in slide-in-from-bottom-8 duration-700">
                    <div className="p-12 pb-8 flex flex-col items-center text-center relative overflow-visible">
                        <div className="absolute top-0 left-0 w-full h-full bg-gradient-to-br from-red-500/10 to-rose-600/10 dark:from-red-900/20 dark:to-rose-900/20 pointer-events-none"></div>
                        <div className="w-24 h-24 bg-white dark:bg-slate-800 rounded-full mb-6 shadow-xl border border-red-100 dark:border-slate-700 flex items-center justify-center relative group">
                            <div className="absolute inset-0 bg-red-400 rounded-full opacity-20 group-hover:scale-150 transition-transform duration-700"></div>
                            <i className="fa-solid fa-person-breastfeeding text-5xl bg-clip-text text-transparent bg-gradient-to-br from-red-500 to-rose-600 drop-shadow-sm text-red-500"></i>
                        </div>
                        <h1 className="text-3xl sm:text-4xl md:text-5xl font-black uppercase tracking-tighter mb-3 z-10 bg-clip-text text-transparent bg-gradient-to-r from-red-600 to-rose-600 dark:from-red-400 dark:to-rose-400 drop-shadow-sm">SẢN KHOA: U BUỒNG TRỨNG LÀNH TÍNH</h1>
                        <p className="text-red-700 dark:text-red-300 text-lg font-bold tracking-widest uppercase z-10 opacity-80">CHUYÊN ĐỀ: U BUỒNG TRỨNG LÀNH TÍNH</p>
                    </div>
                    <div className="p-10 pt-2 bg-white/40 dark:bg-slate-900/40 backdrop-blur-md">
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mb-8">
                            <div className="flex items-center gap-4 bg-white/70 dark:bg-slate-800/70 p-5 rounded-2xl border border-white/50 dark:border-slate-700/50 shadow-sm transition-transform duration-300 hover:-translate-y-1 hover:shadow-md">
                                <div className="bg-red-100 dark:bg-red-900/50 w-12 h-12 flex items-center justify-center rounded-xl text-red-600 dark:text-red-400 shadow-inner"><i className="fa-solid fa-layer-group text-xl"></i></div>
                                <div><p className="text-[10px] text-slate-500 dark:text-slate-400 font-black uppercase tracking-widest mb-1">Tổng câu hỏi</p><p className="text-2xl font-black text-slate-800 dark:text-slate-100 leading-none">{questions.length}</p></div>
                            </div>
                            <div className="flex items-center gap-4 bg-white/70 dark:bg-slate-800/70 p-5 rounded-2xl border border-white/50 dark:border-slate-700/50 shadow-sm transition-transform duration-300 hover:-translate-y-1 hover:shadow-md">
                                <div className="bg-rose-100 dark:bg-rose-900/50 w-12 h-12 flex items-center justify-center rounded-xl text-rose-600 dark:text-rose-400 shadow-inner"><i className="fa-regular fa-hourglass-half text-xl"></i></div>
                                <div><p className="text-[10px] text-slate-500 dark:text-slate-400 font-black uppercase tracking-widest mb-1">Thời gian</p><p className="text-2xl font-black text-slate-800 dark:text-slate-100 leading-none">{questions.length} Phút</p></div>
                            </div>
                        </div>
                        <div className="bg-red-50/80 dark:bg-red-900/20 rounded-2xl p-6 mb-10 border border-red-100 dark:border-red-800/30 flex items-start gap-4 text-red-900 dark:text-red-100 shadow-inner">
                            <i className="fa-solid fa-circle-info shrink-0 mt-0.5 text-2xl text-rose-600 dark:text-rose-400"></i>
                            <div className="text-base leading-relaxed font-medium">
                                <p className="font-bold mb-3 text-rose-800 dark:text-rose-300 text-lg">Hướng dẫn làm bài:</p>
                                <ul className="list-disc pl-5 space-y-2 opacity-90 marker:text-rose-600 dark:marker:text-rose-400">
                                    <li>Kết quả đúng/sai sẽ hiển thị <strong className="text-rose-900 dark:text-rose-200 font-bold">ngay lập tức</strong> khi chọn.</li>
                                    <li>Khi đã chọn, bạn <strong className="text-rose-900 dark:text-rose-200 font-bold">không thể thay đổi</strong> đáp án của câu đó.</li>
                                    <li>Sử dụng nút <strong className="text-rose-900 dark:text-rose-200 font-bold">Đánh dấu cờ</strong> để lưu lại những câu khó.</li>
                                    <li><i className="fa-solid fa-keyboard mr-1 opacity-70"></i> Phím tắt điểu khiển: Ghép <strong className="text-rose-900 dark:text-rose-200 font-bold">A, B, C, D</strong> để chọn; <strong className="text-rose-900 dark:text-rose-200 font-bold">Mũi tên</strong> để chuyển câu; <strong className="text-rose-900 dark:text-rose-200 font-bold">Phím Space</strong> để cắm cờ.</li>
                                    <li>Được biên soạn bởi <strong className="text-rose-900 dark:text-rose-200 font-bold">TEAMDRCAT</strong>.</li>
                                </ul>
                            </div>
                        </div>
                        <button onClick={startQuiz} className="w-full btn-gradient text-white text-xl font-black py-5 rounded-2xl transition-all duration-300 shadow-[0_10px_20px_-10px_rgba(220,38,38,0.6)] hover:shadow-[0_15px_25px_-10px_rgba(220,38,38,0.8)] flex items-center justify-center gap-3 uppercase tracking-widest hover:-translate-y-1 active:scale-95 border border-white/20">
                            <i className="fa-solid fa-rocket text-xl"></i> Bắt đầu ngay
                        </button>
                    </div>
                </div>
            </div>
        );
    }

    return (
        <div className="min-h-screen flex flex-col md:flex-row relative transition-colors duration-1000 z-0">
            {showDrNote && (
                <div className="fixed z-[100] w-72 glass-panel shadow-2xl rounded-2xl overflow-visible transform-gpu border border-red-500/50" style={{ right: '2rem', bottom: '2rem', animation: 'slideIn 0.3s ease-out' }} ref={(el) => { if(el && !el.dataset.dragInit) { el.dataset.dragInit = 'true'; el.style.transform = window._drNoteTransform || ''; } } }>
                    <div className="bg-gradient-to-r from-red-600 to-rose-600 px-4 py-3 flex justify-between items-center text-white cursor-move" style={{ touchAction: 'none' }} onPointerDown={(e) => { if(e.target.closest('button')) return; const el = e.currentTarget; const panel = el.parentElement; el.setPointerCapture(e.pointerId); const startX = e.clientX; const startY = e.clientY; const transformStr = panel.style.transform; let initialDx = 0, initialDy = 0; if(transformStr && transformStr.includes('translate(')) { const match = transformStr.match(/translate\(([-\d.]+)px,\s*([-\d.]+)px\)/); if(match) { initialDx = parseFloat(match[1]); initialDy = parseFloat(match[2]); } } const onMove = (moveEvent) => { const dx = initialDx + (moveEvent.clientX - startX); const dy = initialDy + (moveEvent.clientY - startY); const newTransform = `translate(${dx}px, ${dy}px)`; panel.style.transform = newTransform; window._drNoteTransform = newTransform; }; const onUp = () => { el.removeEventListener('pointermove', onMove); el.removeEventListener('pointerup', onUp); el.releasePointerCapture(e.pointerId); }; el.addEventListener('pointermove', onMove); el.addEventListener('pointerup', onUp); }}>
                        <span className="font-bold flex items-center gap-2"><i className="fa-solid fa-user-doctor"></i> Sổ tay Y lệnh</span>
                        <button onClick={() => setShowDrNote(false)} className="hover:text-red-200 transition-colors"><i className="fa-solid fa-xmark"></i></button>
                    </div>
                    <div className="p-0">
                        <textarea 
                            value={drNoteContent}
                            onChange={(e) => setDrNoteContent(e.target.value)}
                            placeholder="Ghi chú các thông số bất thường, chẩn đoán sơ bộ..."
                            className="w-full h-48 p-4 bg-yellow-50/90 dark:bg-yellow-900/20 text-slate-800 dark:text-slate-200 resize-none outline-none font-mono text-sm border-none focus:ring-0 custom-scrollbar"
                            style={{ backgroundImage: 'linear-gradient(transparent, transparent 27px, #cbd5e1 28px)', backgroundSize: '100% 28px', lineHeight: '28px' }}
                        ></textarea>
                    </div>
                </div>
            )}
            
            {showMatrix && <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-40 md:hidden transition-opacity" onClick={() => setShowMatrix(false)}></div>}
            
            <aside className={`fixed md:sticky top-0 right-0 h-screen w-[85vw] max-w-[320px] md:max-w-none md:w-[400px] glass-panel z-50 flex flex-col transition-transform duration-500 ease-in-out ${showMatrix ? 'translate-x-0' : 'translate-x-full md:translate-x-0'} md:order-2 shadow-[-10px_0_30px_rgba(0,0,0,0.05)] dark:shadow-none border-l border-white/40 dark:border-slate-700/50`}>
                <div className="p-6 border-b border-slate-200/50 dark:border-slate-700/50 flex justify-between items-center bg-white/40 dark:bg-slate-800/40 backdrop-blur-md sticky top-0 z-10">
                    <h2 className="font-black text-slate-800 dark:text-slate-100 flex items-center gap-3 uppercase tracking-tighter text-base"><div className="w-8 h-8 rounded-lg bg-red-100 dark:bg-red-900/50 flex items-center justify-center text-red-600 dark:text-red-400"><i className="fa-solid fa-grip"></i></div> Bảng câu hỏi</h2>
                    <button className="md:hidden text-slate-500 p-2 bg-white/50 dark:bg-slate-700/50 rounded-full hover:bg-white dark:hover:bg-slate-600 transition-colors shadow-sm" onClick={() => setShowMatrix(false)}><i className="fa-solid fa-xmark text-lg"></i></button>
                </div>
                <div className="flex-1 overflow-y-auto p-6 custom-scrollbar grid grid-cols-5 gap-3 content-start">
                    {questions.map((q, i) => {
                        let navBtnClass = "h-12 w-full rounded-xl text-sm font-black border transition-all duration-300 relative flex items-center justify-center hover:brightness-95 bg-white/60 dark:bg-slate-700/60 text-slate-500 border-white/50 dark:border-slate-600/50 dark:text-slate-300 shadow-sm hover:-translate-y-1 hover:shadow-md";
                        if (!!answers[i]) {
                            if (answers[i] === q.answer) {
                                navBtnClass = "h-12 w-full rounded-xl text-sm font-black border-2 transition-all duration-300 relative flex items-center justify-center hover:brightness-95 bg-green-100/90 dark:bg-green-900/60 text-green-700 dark:text-green-300 border-green-400/50 dark:border-green-600/50 shadow-sm hover:-translate-y-1";
                            } else {
                                navBtnClass = "h-12 w-full rounded-xl text-sm font-black border-2 transition-all duration-300 relative flex items-center justify-center hover:brightness-95 bg-red-100/90 dark:bg-red-900/60 text-red-700 dark:text-red-300 border-red-400/50 dark:border-red-600/50 shadow-sm hover:-translate-y-1";
                            }
                        }
                        if (currentIndex === i && appState !== 'review') {
                            navBtnClass += " ring-4 ring-red-500/30 ring-offset-1 dark:ring-offset-slate-800 scale-105 z-10";
                        }
                        if (flagged.has(i)) {
                            navBtnClass += " !border-orange-400 dark:!border-orange-500 !bg-orange-100/90 dark:!bg-orange-900/50 text-orange-700 dark:text-orange-400";
                        }
                        return (
                            <button 
                                key={i} 
                                onClick={() => { 
                                    if (appState === 'review') { 
                                        const target = document.getElementById(`review-q-${i}`); 
                                        if (target) target.scrollIntoView({ behavior: 'smooth', block: 'center' }); 
                                    } else { 
                                        setCurrentIndex(i); 
                                    } 
                                    if (window.innerWidth < 768) setShowMatrix(false); 
                                }} 
                                className={navBtnClass}
                            >
                                {i + 1}
                                {flagged.has(i) && <div className="absolute -top-2 -right-2 w-5 h-5 bg-gradient-to-br from-orange-400 to-red-500 rounded-full border border-white dark:border-slate-800 shadow-md flex items-center justify-center text-white text-[10px]"><i className="fa-solid fa-flag"></i></div>}
                            </button>
                        );
                    })}
                </div>
                <div className="p-6 border-t border-slate-200/50 dark:border-slate-700/50 bg-white/40 dark:bg-slate-800/40 backdrop-blur-md z-10">
                    {appState === 'quiz' ? (
                        <button onClick={() => { if(window.confirm('Bạn có chắc chắn muốn nộp bài?')) { setAppState('result'); setShowMatrix(false); } }} className="w-full btn-gradient text-white font-black py-4 rounded-xl shadow-lg flex items-center justify-center gap-2 uppercase tracking-widest hover:shadow-red-500/40 transition-all hover:-translate-y-1"><i className="fa-solid fa-paper-plane text-lg"></i> Nộp bài ngay</button>
                    ) : (
                        <button onClick={restartQuiz} className="w-full bg-slate-800 dark:bg-slate-700 text-white font-black py-4 rounded-xl flex items-center justify-center gap-2 hover:bg-slate-900 dark:hover:bg-slate-600 transition-colors shadow-md hover:-translate-y-1"><i className="fa-solid fa-rotate-right text-lg"></i> Làm lại từ đầu</button>
                    )}
                </div>
            </aside>

            <main className="flex-1 flex flex-col min-h-screen md:order-1 overflow-visible relative z-10">
                <header className="glass-panel border-b border-white/50 dark:border-slate-700/50 px-4 md:px-6 py-3 md:py-4 flex items-start sm:items-center justify-between sticky top-0 z-30 shadow-sm rounded-none">
                    <div className="flex items-center gap-4">
                        <div className="w-12 h-12 btn-gradient rounded-2xl flex items-center justify-center text-white shadow-lg shadow-red-200/50 dark:shadow-none"><i className="fa-solid fa-person-breastfeeding text-2xl"></i></div>
                        <div className="hidden sm:block"><h1 className="text-sm font-black text-slate-800 dark:text-slate-100 uppercase tracking-tight drop-shadow-sm">SẢN KHOA: U BUỒNG TRỨNG LÀNH TÍNH</h1><p className="text-[10px] text-red-600 dark:text-red-400 font-bold uppercase tracking-widest mt-0.5">Tài liệu bởi TeamDrCat</p></div>
                    </div>
                    <div className="flex flex-wrap items-center justify-end gap-x-2 gap-y-3 sm:gap-4 ml-auto" style={{ maxWidth: "calc(100vw - 120px)" }}>
                        <GoogleSearch />
                        <RealTimeClock />
                        <button onClick={() => setIsSoundEnabled(!isSoundEnabled)} className="p-2.5 bg-white/60 dark:bg-slate-700/60 rounded-xl hover:bg-white dark:hover:bg-slate-600 transition-colors text-slate-600 dark:text-slate-300 border border-white/40 dark:border-slate-600/50 shadow-sm">
                            {isSoundEnabled ? <i className="fa-solid fa-volume-high text-lg text-red-500"></i> : <i className="fa-solid fa-volume-xmark text-lg text-slate-400"></i>}
                        </button>
                        <button onClick={() => setZoomLevel(prev => Math.min(prev + 10, 150))} title="Phóng to" className="p-2.5 bg-white/60 dark:bg-slate-700/60 rounded-xl hover:bg-white dark:hover:bg-slate-600 transition-colors text-slate-600 dark:text-slate-300 border border-white/40 dark:border-slate-600/50 shadow-sm">
                              <i className="fa-solid fa-magnifying-glass-plus text-lg text-rose-500"></i>
                          </button>
                          <button onClick={() => setZoomLevel(prev => Math.max(prev - 10, 50))} title="Thu nhỏ" className="p-2.5 bg-white/60 dark:bg-slate-700/60 rounded-xl hover:bg-white dark:hover:bg-slate-600 transition-colors text-slate-600 dark:text-slate-300 border border-white/40 dark:border-slate-600/50 shadow-sm">
                              <i className="fa-solid fa-magnifying-glass-minus text-lg text-rose-500"></i>
                          </button>
                          <button onClick={() => setIsDarkMode(!isDarkMode)} className="p-2.5 bg-white/60 dark:bg-slate-700/60 rounded-xl hover:bg-white dark:hover:bg-slate-600 transition-colors text-slate-600 dark:text-slate-300 border border-white/40 dark:border-slate-600/50 shadow-sm">
                            {isDarkMode ? <i className="fa-solid fa-sun text-lg text-amber-500"></i> : <i className="fa-solid fa-moon text-lg text-red-500"></i>}
                        </button>
                        {appState === 'quiz' && (
                            <React.Fragment>
                        <button onClick={() => setShowDrNote(!showDrNote)} className="p-2.5 bg-yellow-100/80 dark:bg-yellow-900/50 rounded-xl hover:bg-yellow-200 dark:hover:bg-yellow-800 transition-colors text-yellow-700 dark:text-yellow-400 border border-yellow-300/50 dark:border-yellow-700/50 shadow-sm" title="Mở sổ tay">
                            <i className="fa-solid fa-notes-medical text-lg"></i>
                        </button>
                            </React.Fragment>
                        )}
                        {appState === 'quiz' && (
                            <React.Fragment>
                                <div className={`px-4 py-2 rounded-xl font-mono text-lg font-black border flex items-center gap-3 shadow-sm transition-colors ${timeRemaining < 120 ? 'bg-red-50/90 dark:bg-red-900/50 border-red-300 dark:border-red-700 text-red-600 dark:text-red-400 border-2' : 'bg-white/60 dark:bg-slate-700/60 border-white/50 dark:border-slate-600/50 text-red-700 dark:text-red-300'}`}>
                                    <i className={`fa-solid fa-heart-pulse text-xl ${timeRemaining < 120 ? 'animate-heartbeat-fast' : 'animate-heartbeat'}`}></i>
                                    {formatTime(timeRemaining)}
                                </div>
                                <button onClick={togglePause} className="p-2.5 bg-white/60 dark:bg-slate-700/60 rounded-xl hover:bg-white dark:hover:bg-slate-600 transition-colors text-red-600 dark:text-red-400 border border-white/40 dark:border-slate-600/50 shadow-sm">
                                    {isPaused ? <i className="fa-solid fa-play text-lg"></i> : <i className="fa-solid fa-pause text-lg"></i>}
                                </button>
                            </React.Fragment>
                        )}
                        {appState === 'review' && <div className="px-4 py-2 rounded-xl font-black bg-amber-100/90 dark:bg-amber-900/50 text-amber-700 dark:text-amber-400 flex items-center gap-2 border border-amber-300/50 dark:border-amber-700/50 shadow-sm"><i className="fa-solid fa-eye"></i> <span className="hidden sm:inline uppercase text-xs tracking-wider">Xem lại</span></div>}
                        <button className="md:hidden bg-white/60 dark:bg-slate-700/60 text-red-600 dark:text-red-400 p-2.5 rounded-xl flex items-center justify-center border border-white/40 dark:border-slate-600/50 shadow-sm" onClick={() => setShowMatrix(true)}><i className="fa-solid fa-bars text-lg"></i></button>
                    </div>
                </header>

                <div ref={scrollContainerRef} className="flex-1 overflow-y-auto p-4 md:p-8 custom-scrollbar relative z-0">
                    <div className="max-w-4xl mx-auto w-full pb-8">
                        {renderQuizContent()}
                    </div>
                </div>
            </main>
        </div>
    );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>

<!-- PWA NAV INJECTED V4 (FLOATING PILL) -->
<div id="pwa-nav-bar-v4" class="fixed bottom-2 sm:bottom-4 left-1/2 -translate-x-1/2 z-[99999] flex flex-row items-center gap-1 p-1.5 rounded-[2rem] bg-slate-900/85 backdrop-blur-2xl border border-slate-700/50 shadow-lg font-sans select-none transition-all duration-300 hover:bg-slate-900 scale-90 sm:scale-100">
    <a href="index.html" class="flex flex-row items-center justify-center h-10 px-4 rounded-full text-slate-400 hover:text-white hover:bg-white/10 transition-all gap-2 active:scale-95 cursor-pointer">
        <i class="fas fa-home text-base"></i>
        <span class="text-[10px] font-black tracking-widest uppercase mt-0.5">Trang chủ</span>
    </a>
    <div class="w-px h-6 bg-slate-700/80 mx-0.5"></div>
    <button onclick="toggleBookmarkV4('3D_CASE U BUỒNG TRỨNG LÀNH TÍNH.html')" id="btn-bm-v4-UBUỒNGTRỨNGLÀNHTÍNH" class="flex flex-row items-center justify-center h-10 px-4 rounded-full text-slate-400 hover:bg-white/10 transition-all gap-2 active:scale-95 group cursor-pointer">
        <i class="fas fa-heart text-base transition-colors group-hover:text-red-400"></i>
        <span class="text-[10px] font-black tracking-widest uppercase mt-0.5">Lưu</span>
    </button>
    <div class="w-px h-6 bg-slate-700/80 mx-0.5"></div>
    <button onclick="toggleCompleteV4('3D_CASE U BUỒNG TRỨNG LÀNH TÍNH.html')" id="btn-cp-v4-UBUỒNGTRỨNGLÀNHTÍNH" class="flex flex-row items-center justify-center h-10 px-4 rounded-full text-slate-400 hover:bg-white/10 transition-all gap-2 active:scale-95 group cursor-pointer">
        <i class="fas fa-check-circle text-base transition-colors group-hover:text-emerald-400"></i>
        <span class="text-[10px] font-black tracking-widest uppercase mt-0.5">Đã Xong</span>
    </button>
    
    <script>
        (function() {
            const fileId = '3D_CASE U BUỒNG TRỨNG LÀNH TÍNH.html';
            const btnId = 'UBUỒNGTRỨNGLÀNHTÍNH';
            function updateV4() {
                const bookmarks = JSON.parse(localStorage.getItem('pwa_san_bookmarks') || '[]');
                const completed = JSON.parse(localStorage.getItem('pwa_san_completed') || '[]');
                
                const heartBtn = document.getElementById('btn-bm-v4-' + btnId);
                const checkBtn = document.getElementById('btn-cp-v4-' + btnId);
                
                if(heartBtn){
                    if (bookmarks.includes(fileId)) {
                        heartBtn.classList.remove('text-slate-400'); heartBtn.classList.add('text-red-500');
                        heartBtn.querySelector('i').style.textShadow = '0 0 10px rgba(239, 68, 68, 0.5)';
                    } else {
                        heartBtn.classList.add('text-slate-400'); heartBtn.classList.remove('text-red-500');
                        heartBtn.querySelector('i').style.textShadow = 'none';
                    }
                }
                if(checkBtn){
                    if (completed.includes(fileId)) {
                        checkBtn.classList.remove('text-slate-400'); checkBtn.classList.add('text-emerald-400');
                        checkBtn.querySelector('span').innerText = '100%';
                        checkBtn.querySelector('i').style.textShadow = '0 0 10px rgba(52, 211, 153, 0.5)';
                    } else {
                        checkBtn.classList.add('text-slate-400'); checkBtn.classList.remove('text-emerald-400');
                        checkBtn.querySelector('span').innerText = 'ĐÃ XONG';
                        checkBtn.querySelector('i').style.textShadow = 'none';
                    }
                }
            }
            window.toggleBookmarkV4 = function(fId) {
                let b = JSON.parse(localStorage.getItem('pwa_san_bookmarks') || '[]');
                if (b.includes(fId)) window.localStorage.setItem('pwa_san_bookmarks', JSON.stringify(b.filter(i => i !== fId)));
                else { b.push(fId); window.localStorage.setItem('pwa_san_bookmarks', JSON.stringify(b)); }
                updateV4();
            };
            window.toggleCompleteV4 = function(fId) {
                let c = JSON.parse(localStorage.getItem('pwa_san_completed') || '[]');
                if (c.includes(fId)) window.localStorage.setItem('pwa_san_completed', JSON.stringify(c.filter(i => i !== fId)));
                else { c.push(fId); window.localStorage.setItem('pwa_san_completed', JSON.stringify(c)); }
                updateV4();
            };
            document.addEventListener('DOMContentLoaded', updateV4);
            setTimeout(updateV4, 500);
        })();
    </script>
</div>
</body>
</html>
