    <!-- AUTH LOGIC V4 -->
    <script>
        const AUTH_API = "https://script.google.com/macros/s/AKfycbzUNA96SRsLQv7hlu83GAx6L85kEia8S52KY7nCRfWLlpJslMAT_Z-n9PMOoG_RNW6Q/exec";
        let deviceId = localStorage.getItem('TDC_DEVICE_ID_SAN');
        if (!deviceId) {
            deviceId = "TDC-" + Math.random().toString(36).substring(2, 6).toUpperCase() + "-" + Math.random().toString(36).substring(2, 6).toUpperCase();
            localStorage.setItem('TDC_DEVICE_ID_SAN', deviceId);
        }

        function checkAuth() {
            if (localStorage.getItem('TDC_APPROVED_SAN') === 'true') {
                setInterval(silentVerify, 10000); 
                return;
            }
            document.addEventListener('DOMContentLoaded', () => {
                document.getElementById('lock-screen').style.display = 'flex';
                document.body.style.overflow = 'hidden';
                verifyWithServer();
            });
        }

        function verifyWithServer() {
            const statusText = document.getElementById('lock-status');
            const lockContainer = document.getElementById('lock-container');
            const lockScreen = document.getElementById('lock-screen');
            if(!statusText) return;
            statusText.innerText = "Đang mã hóa tín hiệu Server...";
            lockContainer.classList.add('hidden');

            fetch(AUTH_API + "?id=" + deviceId)
                .then(r => r.json())
                .then(data => {
                    if (data.status === "approved" || data.status === "ok") {
                        localStorage.setItem('TDC_APPROVED_SAN', 'true');
                        lockScreen.style.opacity = '0';
                        setTimeout(() => { lockScreen.style.display = 'none'; document.body.style.overflow = 'auto'; }, 500);
                    } else {
                        statusText.innerHTML = "Chào mừng Sinh Viên Y Khoa.<br>Vui lòng sao chép mã thiết bị để kích hoạt APP SẢN KHOA.";
                        document.getElementById('lock-device-code').value = deviceId;
                        lockContainer.classList.remove('hidden');
                    }
                })
                .catch(e => {
                    statusText.innerHTML = "Offline.<br>Yêu cầu mạng di động/WiFi để xác thực khóa.";
                    lockContainer.classList.remove('hidden');
                });
        }

        function silentVerify() {
            if(navigator.onLine && localStorage.getItem('TDC_APPROVED_SAN') === 'true') {
                fetch(AUTH_API + "?id=" + deviceId).then(r => r.json()).then(data => {
                    if(data.status === "locked" || data.status === "error") {
                        localStorage.setItem('TDC_APPROVED_SAN', 'false'); window.location.reload();
                    }
                }).catch(e => {});
            }
        }

        function copyDeviceId() {
            try {
                if (navigator.clipboard && window.isSecureContext) {
                    navigator.clipboard.writeText(deviceId);
                } else {
                    const textArea = document.createElement("textarea");
                    textArea.value = deviceId;
                    document.body.appendChild(textArea);
                    textArea.focus();
                    textArea.select();
                    document.execCommand('copy');
                    document.body.removeChild(textArea);
                }
            } catch(err) {
                console.error('Copy failed', err);
            }
            const btn = document.getElementById('copyBtn');
            btn.innerHTML = '<i class="fas fa-check text-green-400 text-xl"></i> <span class="tracking-wide text-green-400">ĐÃ LƯU VÀO BỘ NHỚ</span>';
            setTimeout(() => { btn.innerHTML = '<div class="absolute inset-0 w-1/4 bg-white/10 -skew-x-12 -translate-x-full group-hover:animate-[shimmer_1.5s_infinite]"></div><i class="fas fa-paste text-xl text-rose-400"></i> <span class="tracking-wide">SAO CHÉP MÃ THIẾT BỊ</span>'; }, 3000);
        }

        checkAuth();
    </script>

        function getBookmarks() { return JSON.parse(localStorage.getItem('pwa_san_bookmarks') || '[]'); }
        function getCompleted() { return JSON.parse(localStorage.getItem('pwa_san_completed') || '[]'); }
        
        function updateStats() {
            const b = getBookmarks();
            const c = getCompleted();
            const bCnt = document.getElementById('bookmarkCount');
            bCnt.innerText = b.length;
            if(b.length > 0) bCnt.classList.remove('hidden'); else bCnt.classList.add('hidden');
            
            document.getElementById('completedStat').innerText = c.length;
            document.getElementById('progressBar').style.width = (c.length / ALL_CASES.length * 100) + '%';
        }
        
        bookmarkBtn.addEventListener('click', () => {
            showOnlyBookmarks = !showOnlyBookmarks;

            renderCases();
        });

                const isCompleted = completed.includes(caseItem.url);
                const isBookmarked = bookmarks.includes(caseItem.url);
                const animDelay = (visibleCount * 0.05) + 's';
                
                html += `

                            </div>
                            <div class="pr-6">
                                <span class="text-[9px] font-black px-2.5 py-1 rounded-full bg-slate-100 dark:bg-slate-800 text-slate-500 dark:text-slate-400 uppercase tracking-widest">${caseItem.category}</span>
                                <h3 class="font-heading font-bold text-slate-800 dark:text-white line-clamp-2 mt-1.5 leading-snug group-hover:text-rose-500 dark:group-hover:text-rose-400 transition-colors">${caseItem.title}</h3>
                                ${isBookmarked ? `<div class="mt-2 text-pink-500 text-xs flex items-center gap-1"><i class="fas fa-heart"></i> <span class="font-bold">Đã gắn Dấu Trang</span></div>` : ''}
                            </div>
                        </div>
                    </div>
                    <div class="absolute inset-0 border-2 border-transparent group-hover:border-rose-500/20 dark:group-hover:border-rose-500/10 rounded-[24px] pointer-events-none transition-colors duration-500"></div>
                </a>
                `;
            });
            
            caseListEl.innerHTML = html;
            document.getElementById('noResults').classList.toggle('hidden', visibleCount > 0);
        }

        searchInput.addEventListener('input', renderCases);
        
        const themeToggle = document.getElementById('themeToggle');
        const htmlContext = document.documentElement;
        if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) { htmlContext.classList.add('dark'); }
        themeToggle.addEventListener('click', () => { htmlContext.classList.toggle('dark'); localStorage.setItem('theme', htmlContext.classList.contains('dark') ? 'dark' : 'light'); });

        renderCases(); updateStats();
        
        window.addEventListener('focus', () => { updateStats(); renderCases(); silentVerify(); });

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => navigator.serviceWorker.register('./sw.js').then(r => console.log('SW V1 ready')).catch(e => console.error(e)));
        }
    
        // NETWORK STATUS LISTENER
        function updateNetworkStatus() {
            const statusText = document.getElementById('networkText');
            const statusDot = document.getElementById('networkDot');
            const statusContainer = document.getElementById('networkStatus');
            
            if (!statusText) return;
            
            if (navigator.onLine) {
                statusText.innerText = 'ONLINE';
                statusDot.className = 'w-1.5 h-1.5 rounded-full bg-rose-500 animate-pulse transition-colors';
                statusContainer.className = 'text-[9px] uppercase font-bold tracking-widest text-rose-500 flex items-center gap-1.5 transition-colors';
            } else {
                statusText.innerText = 'OFFLINE';
                statusDot.className = 'w-1.5 h-1.5 rounded-full bg-slate-500 transition-colors';
                statusContainer.className = 'text-[9px] uppercase font-bold tracking-widest text-slate-500 flex items-center gap-1.5 transition-colors';
            }
        }
        
        window.addEventListener('online', updateNetworkStatus);
        window.addEventListener('offline', updateNetworkStatus);
        
        document.addEventListener('DOMContentLoaded', updateNetworkStatus);
    </script>
</body>
</html>
